<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpolation Search vs Binary Search</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --is-color: #ec4899;
            --bs-color: #3b82f6;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-top: 5px solid var(--primary);
        }
        header h1 { margin: 0 0 10px 0; color: var(--text-main); font-size: 24px; }
        header p { margin: 0; color: var(--text-muted); font-size: 16px; }
        
        .controls-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label { font-weight: 600; font-size: 14px; }
        input {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            width: 250px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        
        .charts-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .table-wrapper {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }
        th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: var(--text-main);
        }
        tr:last-child td { border-bottom: none; }
        
        @media (max-width: 768px) {
            .charts-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Experiment 1: Implementation & Performance Analysis of Interpolation Search</h1>
        <p><strong>Subject:</strong> AM5303 - Design and Analysis of Algorithms</p>
    </header>

    <div class="controls-card">
        <div class="input-group">
            <label for="targetInput">Enter Target Element to Search (User Input):</label>
            <input type="number" id="targetInput" placeholder="Leave empty to pick a random target">
        </div>
        <button onclick="runExperiment()">▶ Run Analysis</button>
    </div>

    <div class="charts-wrapper" id="chartsArea" style="display: none;">
        <div class="chart-box">
            <canvas id="timeChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="compChart"></canvas>
        </div>
    </div>

    <div class="table-wrapper" id="tableArea" style="display: none;">
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Dataset Size (n)</th>
                    <th>Interpolation Time (ms)</th>
                    <th>Binary Time (ms)</th>
                    <th>IS Comparisons</th>
                    <th>BS Comparisons</th>
                    <th>Found Status</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows injected by JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let timeChartInst = null;
    let compChartInst = null;

    // Strict dataset sizes strictly according to the Lab Manual
    const DATASET_SIZES = [1000, 5000, 10000, 50000, 100000];

    // Algorithms adapted directly from the pseudocode in the lab manual
    function interpolationSearch(arr, target) {
        let low = 0;
        let high = arr.length - 1;
        let comparisons = 0;

        while (low <= high && target >= arr[low] && target <= arr[high]) {
            comparisons++;
            if (low === high) {
                if (arr[low] === target) return { index: low, comps: comparisons };
                return { index: -1, comps: comparisons };
            }

            let pos = low + Math.floor(((target - arr[low]) * (high - low)) / (arr[high] - arr[low]));

            if (arr[pos] === target) return { index: pos, comps: comparisons };
            
            if (arr[pos] < target) {
                low = pos + 1;
            } else {
                high = pos - 1;
            }
        }
        return { index: -1, comps: comparisons };
    }

    function binarySearch(arr, target) {
        let low = 0;
        let high = arr.length - 1;
        let comparisons = 0;

        while (low <= high) {
            comparisons++;
            let mid = Math.floor((low + high) / 2);

            if (arr[mid] === target) return { index: mid, comps: comparisons };
            
            if (arr[mid] < target) {
                low = mid + 1;
            } else {
                high = mid - 1;
            }
        }
        return { index: -1, comps: comparisons };
    }

    function runExperiment() {
        const targetInput = document.getElementById('targetInput').value;
        const TRIALS = 50; // Multiple trials for accurate time measurement
        let results = [];

        DATASET_SIZES.forEach(size => {
            // Generate sorted uniformly distributed integers
            let arr = [];
            let currentVal = 0;
            for (let i = 0; i < size; i++) {
                currentVal += Math.floor(Math.random() * 5) + 1; // Uniform gaps
                arr.push(currentVal);
            }

            // Determine Target: Use user input if provided, else pick a random existing element
            let target = targetInput !== "" ? parseInt(targetInput) : arr[Math.floor(Math.random() * size)];

            // Timing Interpolation Search
            let startIS = performance.now();
            let resIS;
            for (let i = 0; i < TRIALS; i++) {
                resIS = interpolationSearch(arr, target);
            }
            let timeIS = (performance.now() - startIS) / TRIALS;

            // Timing Binary Search
            let startBS = performance.now();
            let resBS;
            for (let i = 0; i < TRIALS; i++) {
                resBS = binarySearch(arr, target);
            }
            let timeBS = (performance.now() - startBS) / TRIALS;

            results.push({
                size: size,
                timeIS: timeIS,
                timeBS: timeBS,
                compIS: resIS.comps,
                compBS: resBS.comps,
                status: resIS.index !== -1 ? "Found" : "Not Found"
            });
        });

        displayResults(results);
    }

    function displayResults(results) {
        document.getElementById('chartsArea').style.display = 'grid';
        document.getElementById('tableArea').style.display = 'block';

        const tbody = document.querySelector('#resultsTable tbody');
        tbody.innerHTML = '';
        
        const labels = [], isTime = [], bsTime = [], isComp = [], bsComp = [];

        results.forEach(res => {
            labels.push(res.size);
            isTime.push(res.timeIS);
            bsTime.push(res.timeBS);
            isComp.push(res.compIS);
            bsComp.push(res.compBS);

            tbody.innerHTML += `
                <tr>
                    <td><strong>${res.size}</strong></td>
                    <td>${res.timeIS.toFixed(5)}</td>
                    <td>${res.timeBS.toFixed(5)}</td>
                    <td style="color: var(--is-color); font-weight: bold;">${res.compIS}</td>
                    <td style="color: var(--bs-color); font-weight: bold;">${res.compBS}</td>
                    <td>${res.status}</td>
                </tr>
            `;
        });

        renderCharts(labels, isTime, bsTime, isComp, bsComp);
    }

    function renderCharts(labels, isTime, bsTime, isComp, bsComp) {
        const ctxTime = document.getElementById('timeChart').getContext('2d');
        const ctxComp = document.getElementById('compChart').getContext('2d');

        if (timeChartInst) timeChartInst.destroy();
        if (compChartInst) compChartInst.destroy();

        const commonOptions = { responsive: true, maintainAspectRatio: false };

        timeChartInst = new Chart(ctxTime, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Interpolation Search (ms)', data: isTime, borderColor: '#ec4899', backgroundColor: '#ec4899', tension: 0.2 },
                    { label: 'Binary Search (ms)', data: bsTime, borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.2 }
                ]
            },
            options: { ...commonOptions, plugins: { title: { display: true, text: 'Execution Time vs Dataset Size', font: { size: 16 } } } }
        });

        compChartInst = new Chart(ctxComp, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'IS Comparisons', data: isComp, backgroundColor: '#ec4899' },
                    { label: 'BS Comparisons', data: bsComp, backgroundColor: '#3b82f6' }
                ]
            },
            options: { ...commonOptions, plugins: { title: { display: true, text: 'Number of Comparisons vs Dataset Size', font: { size: 16 } } } }
        });
    }
</script>
</body>
</html>
